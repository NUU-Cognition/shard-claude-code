shard-spec: "0.1.0"
version: "0.1.2"
name: Claude Code
shorthand: cc
description: Claude Code agent harness — CLAUDE.md, settings, and slash commands
depends:
  - NUU-Cognition/shard-flint

folders:
  - .claude
  - .claude/commands

install:
  - source: CLAUDE.md
    dest: CLAUDE.md
    mode: force
  - source: settings.json
    dest: .claude/settings.json
    mode: force
  - source: commands/session-info.md
    dest: .claude/commands/session-info.md
    mode: force
